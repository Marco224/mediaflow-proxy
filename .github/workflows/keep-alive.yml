name: Keep Hugging Face Space Alive

on:
  schedule:
    # Esegue il riavvio ogni giorno alle 00:00 UTC (circa le 02:00 in Italia)
    # Puoi cambiare l'orario modificando i numeri del cron
    - cron: '0 0 * * *'
  workflow_dispatch: # Permette di avviare il riavvio manualmente da GitHub

jobs:
  restart-space:
    runs-on: ubuntu-latest
    steps:
      - name: Installa Python e HuggingFace Hub
        run: |
          pip install huggingface_hub

      - name: Riavvia lo Spazio Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          
          # Parametri dello spazio
          repo_id = 'Marco224/mediaflow-proxy'
          token = os.getenv('HF_TOKEN')
          
          if not token:
              print('ERRORE: Token HF_TOKEN non trovato nei Secret di GitHub!')
              exit(1)
              
          api = HfApi(token=token)
          try:
              api.restart_space(repo_id=repo_id)
              print(f'Successo: Segnale di riavvio inviato a {repo_id}')
          except Exception as e:
              print(f'Errore durante il riavvio: {e}')
              exit(1)
          "
